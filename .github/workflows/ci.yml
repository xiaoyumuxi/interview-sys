name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-test:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Go tests
        run: go test ./...

  python-runtime-test:
    name: Python runtime tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python-runtime
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.3"
          enable-cache: true
          cache-dependency-glob: python-runtime/uv.lock

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run Python runtime tests
        run: uv run python -m unittest discover -s tests -p 'test_*.py' -v
